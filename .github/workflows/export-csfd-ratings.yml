name: Export ČSFD ratings

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: csfd-ratings-export
  cancel-in-progress: false

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Export all ČSFD ratings
        run: npm run export
        env:
          CSFD_USER: 115923-bon-go
          PAGE_DELAY_MS: 5000
          PAGE_DELAY_JITTER_MS: 1500
          MIN_EXPECTED_RATINGS: 1300
          MAX_DROP_RATIO: 0.01

      - name: Commit changed export
        run: |
          if [[ -z "$(git status --porcelain -- data/csfd-ratings.json)" ]]; then
            echo "No rating changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/csfd-ratings.json
          git commit -m "Update ČSFD ratings"
          git push
